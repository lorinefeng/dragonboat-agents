name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "release/**"

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run demo:test

      - name: Build demo web
        run: npm run demo:build

      - name: Check whitespace
        run: git diff --check
